<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestra Boda</title>

    <!-- Enlace a estilos -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Fuentes elegantes -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600&family=Josefin+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- =========================
         HERO (Pantalla completa)
         ========================= -->
    <section class="hero">
      <!-- Capa oscura para mejorar legibilidad -->
      <div class="overlay"></div>

      <!-- Contenido principal -->
      <div class="contenido">
        <div class="icono">
          <img src="assets/corazon_nombres2.svg" alt="decoración" />
        </div>
        <!-- Fecha -->
        <p class="fecha">14 | NOVIEMBRE | 2026</p>

        <!-- Nombres -->
        <h1 class="nombres">
          <span class="nombre">SALVADOR</span>
          <span class="and">&</span>
          <span class="nombre">HATSUMI</span>
        </h1>

        <!-- Texto pequeño -->
        <p class="subtitulo">NUESTRA BODA</p>
      </div>
    </section>

    <!-- =========================
     COUNTDOWN SECCIÓN
========================= -->
    <section class="countdown-section">
      <!-- Título -->
      <p class="countdown-title">SOLO FALTAN</p>

      <!-- Contenedor del tiempo -->
      <div class="countdown-container">
        <div class="tiempo">
          <span id="dias">00</span>
          <p>DÍAS</p>
        </div>

        <div class="tiempo">
          <span id="horas">00</span>
          <p>HORAS</p>
        </div>

        <div class="tiempo">
          <span id="minutos">00</span>
          <p>MIN</p>
        </div>

        <div class="tiempo">
          <span id="segundos">00</span>
          <p>SEG</p>
        </div>
      </div>

      <!-- Frase -->
      <div class="frase-box">
        <p>
          El amor nos encontró, nos unió y hoy nos celebramos, te invitamos a
          ser parte de este día inolvidable, con la bendición de Dios y el
          cariño de nuestras familias.
        </p>
      </div>
    </section>

    <section class="nombres-section">
      <div class="nombres-container">
        <p class="seccion-titulo">NOSOTROS</p>
        <img src="assets/nombre-cactus.svg" alt="Salvador y Hatsumi" />
        <img
          class="foto-oval"
          src="assets/novios.jpeg"
          alt="Salvador y Hatsumi"
        />
      </div>
    </section>

    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
