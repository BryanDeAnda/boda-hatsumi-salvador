<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestra Boda</title>

    <!-- Enlace a estilos -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Fuentes elegantes -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600&family=Josefin+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- =========================
         HERO (Pantalla completa)
         ========================= -->
    <section class="hero">
      <!-- Capa oscura para mejorar legibilidad -->
      <div class="overlay"></div>

      <!-- Contenido principal -->
      <div class="contenido">
        <div class="icono">
          <img src="assets/corazon_nombres.svg" alt="decoración" />
        </div>
        <!-- Fecha -->
        <p class="fecha">14 | NOVIEMBRE | 2026</p>

        <!-- Nombres -->
        <h1 class="nombres">
          <span class="nombre">HATSUMI</span>
          <span class="and">&</span>
          <span class="nombre">SALVADOR</span>
        </h1>

        <!-- Texto pequeño -->
        <p class="subtitulo">NUESTRA BODA</p>

        <!-- Contador -->
        <div id="countdown"></div>
      </div>
    </section>

    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
